# Summary of fields referenced in this file
# Notation: `{a, b}` expands to each variant (e.g. `quest_{left, right}_controller`
# means both `quest_left_controller` and `quest_right_controller`).
#
# Observations (states):
#   /footpedal_states
#     - /buttons                                          : 3 footpedal button states
#   /tf_chain (each frame exposes transform / delta_transform / is_fresh)
#     - /quest_origin/quest_hmd                           : Quest HMD pose
#     - /quest_origin/quest_{left, right}_controller      : Quest controller pose
#     - /quest_origin/{left, right}_hand_root             : hand root pose
#     - /quest_origin/{left, right}_hand_cam_link         : hand camera link pose
#     - /quest_origin/{left, right}_{left, right}_finger_tip_link
#                                                         : finger tip pose
#                                                           (outer = hand side, inner = finger side)
#     - /left_hand_root/right_hand_root                   : right hand pose relative to left hand
#   /joint_states (each field exposes position / is_fresh)
#     - /position                                         : finger joint positions
#                                                           [left_right_finger_joint, right_right_finger_joint]
#     - /is_fresh                                         : freshness flag for the joint positions
#
#   For each pose above:
#     transform       -> absolute pose       [x, y, z, qx, qy, qz, qw]
#     delta_transform -> per-step delta pose [dx, dy, dz, dqx, dqy, dqz, dqw]
#     is_fresh        -> freshness flag for the absolute transform
#
# Observations (images):
#   /{left, right}_camera/image_raw/compressed         : side cameras (Video + /is_fresh)
#   /camera/camera/color/image_raw/compressed          : center camera (Video + /is_fresh)
#
# Actions:
#   /footpedal_states    /buttons                      : footpedal action
#   /tf_chain            /quest_origin/quest_{left, right}_controller/delta_transform + is_fresh
#                                                      : controller delta action
#   /joint_states/action /position + is_fresh         : finger joint position action
#                                                        [left_right_finger_joint, right_right_finger_joint]

# Observations (states)
- type: Parquet
  topic: /footpedal_states
  field: /buttons
  feature: observation.state
  names:
    - "footpedal_button_0"
    - "footpedal_button_1"
    - "footpedal_button_2"
- type: Parquet
